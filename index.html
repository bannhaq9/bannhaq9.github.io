<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Tra BĐS | Bất Động Sản Nhà Phố Uy Tín</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Be Vietnam Pro', sans-serif; color: #333; }
  :root { --primary-color: #e03c31; --dark-color: #222; }
  .navbar-brand { font-weight: 700; font-size: 1.5rem; color: var(--primary-color) !important; }
  .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
  .btn-primary:hover { background-color: #c43229; border-color: #c43229; }
  .property-card { border: 1px solid #eee; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s ease; height: 100%; }
  .property-card:hover { transform: translateY(-10px); }
  .card-img-wrapper { position: relative; height: 220px; overflow: hidden; background: #f0f0f0; }
  .card-img-wrapper img { width: 100%; height: 220px; object-fit: cover; }
  .img-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
  .img-nav.prev { left: 8px; }
  .img-nav.next { right: 8px; }
  .img-counter { position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,0.7); color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; }
  .badge-new { background: #e03c31; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; display: inline-block; }
</style>
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand" href="#">THANH TRA BĐS</a>
      <div class="ms-auto">
        <a class="btn btn-danger btn-sm" href="dang-tin.html"><i class="fas fa-plus"></i> Đăng Tin</a>
        <button class="btn btn-outline-secondary btn-sm" id="adminToggle" onclick="toggleAdminMode()">Admin</button>
      </div>
    </div>
  </nav>
</header>

<main style="padding-top: 80px;">
  <section id="products" class="py-5">
    <div class="container">
      <h2 class="text-center mb-5">SẢN PHẨM MỚI NHẤT</h2>
      <div id="product-list" class="row g-4">
        <div class="text-center p-5"><div class="spinner-border text-danger"></div><p>Đang tải...</p></div>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const sheetUrl = "data/products.json";
const scriptURL = "https://script.google.com/macros/s/AKfycbwMHChxlCNW1H8LPkMNzm1VDOmx6fpOspAoyhbSqd0Rix9dryUl0esAuLTJpk5v8nch/exec";
let adminMode = false;
let adminPassword = "";

// Hàm copy nội dung
function copyContent(encodedContent) {
  const content = decodeURIComponent(encodedContent);
  navigator.clipboard.writeText(content).then(() => alert("Đã copy nội dung!"));
}

function toggleAdminMode() {
  if (!adminMode) {
    const pass = prompt("Nhập mật khẩu Admin:");
    if (pass) { adminPassword = pass; adminMode = true; loadProducts(); }
  } else {
    adminMode = false; adminPassword = ""; loadProducts();
  }
}

function createCard(product, idx) {
  const contentToCopy = `${product.tieu_de.toUpperCase()}\nVị trí: ${product.duongpho}, ${product.phuongxa}\nGiá: ${product.price} Tỷ\n${product.mo_ta}`;
  
  let adminActionsHtml = '';
  if (adminMode) {
    adminActionsHtml = `
      <div class="d-flex flex-column gap-2 mt-3 pt-3 border-top">
        <button class="btn btn-sm btn-info w-100 fw-bold" onclick="copyContent('${encodeURIComponent(contentToCopy)}')"><i class="fas fa-copy"></i> Copy nội dung</button>
        <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(contentToCopy)}" target="_blank" class="btn btn-sm btn-primary w-100 fw-bold" style="background-color:#1877f2; border:none;"><i class="fab fa-facebook-f"></i> Chia sẻ Facebook</a>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-warning w-100" onclick="editProduct('${product.id}')">Sửa</button>
          <button class="btn btn-sm btn-danger w-100" onclick="deleteProduct('${product.id}')">Xóa</button>
        </div>
      </div>`;
  }

  return `
    <div class="col-md-4" data-price="${product.price}" data-tang="${product.sotang}">
      <div class="property-card p-3">
        <div class="card-img-wrapper" data-images='${JSON.stringify(product.images)}'>
          <img src="${product.images[0]}" class="card-img-top" id="img-${product.id}" data-idx="0">
          ${product.images.length > 1 ? `<button class="img-nav prev" onclick="changeImg('img-${product.id}', -1)">&#8249;</button><button class="img-nav next" onclick="changeImg('img-${product.id}', 1)">&#8250;</button><span class="img-counter">1/${product.images.length}</span>` : ''}
        </div>
        <div class="card-body">
          <h5 class="fw-bold mt-2">${product.tieu_de}</h5>
          <p class="text-danger fw-bold">${product.price} Tỷ</p>
          <p class="small text-muted">${product.duongpho}, ${product.phuongxa}</p>
          ${adminActionsHtml}
        </div>
      </div>
    </div>`;
}

function changeImg(imgId, dir) {
  const el = document.getElementById(imgId);
  const wrapper = el.closest('.card-img-wrapper');
  const imgList = JSON.parse(wrapper.dataset.images);
  let cur = parseInt(el.dataset.idx);
  cur = (cur + dir + imgList.length) % imgList.length;
  el.src = imgList[cur];
  el.dataset.idx = cur;
  wrapper.querySelector('.img-counter').textContent = (cur + 1) + '/' + imgList.length;
}

function editProduct(id) { window.location.href = `dang-tin.html?id=${id}&pwd=${encodeURIComponent(adminPassword)}`; }

async function deleteProduct(id) {
  if (confirm("Xóa tin này?")) {
    const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id, password: adminPassword }) });
    const result = await res.json();
    alert(result.message);
    loadProducts();
  }
}

async function loadProducts() {
  const container = document.getElementById('product-list');
  const res = await fetch(sheetUrl, { cache: 'no-cache' });
  const rows = await res.json();
  container.innerHTML = rows.map((p, i) => createCard(p, i)).join('');
}

window.onload = loadProducts;
</script>
</body>
</html>
